# PodMonitor for KafkaBridge pods.
# Bridge exposes metrics on the rest-api port (8080), NOT tcp-prometheus.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: strimzi-kafka-bridge
  namespace: strimzi-system
  labels:
    observability.giantswarm.io/tenant: giantswarm
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      strimzi.io/kind: KafkaBridge
  podMetricsEndpoints:
    - port: rest-api
      path: /metrics
      scheme: http
      interval: 60s
      scrapeTimeout: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: kubernetes_pod_name
          action: replace
