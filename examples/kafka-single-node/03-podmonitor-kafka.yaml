# PodMonitor for Kafka broker/controller pods (KafkaNodePool), KafkaConnect, and MirrorMaker2.
# These expose metrics on port tcp-prometheus (9404) via the JMX Prometheus exporter.
# Requires metricsConfig to be set in the Kafka / KafkaConnect / KafkaMirrorMaker2 CR.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: strimzi-kafka-resources
  namespace: strimzi-system
  labels:
    observability.giantswarm.io/tenant: giantswarm
spec:
  namespaceSelector:
    any: true
  selector:
    matchExpressions:
      - key: strimzi.io/kind
        operator: In
        values:
          - Kafka
          - KafkaConnect
          - KafkaMirrorMaker2
  podMetricsEndpoints:
    - port: tcp-prometheus
      path: /metrics
      scheme: http
      interval: 60s
      scrapeTimeout: 30s
      relabelings:
        - regex: __meta_kubernetes_pod_label_(strimzi_io_.+)
          replacement: $1
          action: labelmap
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: kubernetes_pod_name
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node_name
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_host_ip]
          targetLabel: node_ip
          action: replace
