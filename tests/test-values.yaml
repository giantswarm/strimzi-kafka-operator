# CI overrides for the strimzi-kafka-operator chart.
# Applied on top of the chart defaults when running e2e tests.
verticalPodAutoscaler:
  # Many test clusters don't have the VPA CRD installed.
  enabled: false

strimzi-kafka-operator:
  # Single replica keeps resource usage low in test environments.
  # Leader election and PodDisruptionBudget are still exercised via the chaos test.
  replicas: 1

  podDisruptionBudget:
    # PDB only has effect with replicas >= 2; disable to avoid a misleading resource.
    enabled: false

  topologySpreadConstraints: []
