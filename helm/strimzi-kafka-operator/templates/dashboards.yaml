{{- if .Values.dashboards.enabled }}
{{- $files := .Files.Glob "files/grafana-dashboards/*.json" }}
{{- range $path, $_ := $files }}
{{- $name := regexReplaceAll "(^.*/)(.*)\\.json$" $path "${2}" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name | trunc 63 | trimSuffix "-" }}
  namespace: {{ $.Values.dashboards.namespace | default $.Release.Namespace }}
  labels:
    {{- if $.Values.dashboards.label }}
    {{ $.Values.dashboards.label }}: {{ $.Values.dashboards.labelValue | quote }}
    {{- end }}
  {{- with $.Values.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{ $name }}.json: {{ $.Files.Get $path | toJson }}
{{- end }}
{{- end }}
