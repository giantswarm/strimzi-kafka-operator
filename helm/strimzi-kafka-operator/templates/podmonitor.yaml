{{- if and (index .Values "strimzi-kafka-operator").enabled .Values.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "strimzi-kafka-operator.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "strimzi-kafka-operator.labels" . | nindent 4 }}
    {{- with .Values.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  # Target the strimzi cluster-operator pod directly (no Service is created by upstream chart).
  selector:
    matchLabels:
      name: strimzi-cluster-operator
      strimzi.io/kind: cluster-operator
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace | quote }}
  podMetricsEndpoints:
    - port: http
      path: /metrics
      scheme: http
      interval: 60s
      scrapeTimeout: 30s
{{- end }}
{{- if and (index .Values "strimzi-kafka-operator").enabled .Values.podMonitor.enabled .Values.podMonitor.workloads.enabled }}
---
# PodMonitor for Kafka / KafkaConnect / KafkaMirrorMaker2 pods (cross-namespace).
# Pods expose metrics on port tcp-prometheus (9404) via the JMX Prometheus exporter.
# Requires metricsConfig to be set in the respective CR.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "strimzi-kafka-operator.fullname" . }}-kafka-resources
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "strimzi-kafka-operator.labels" . | nindent 4 }}
    {{- with .Values.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    any: true
  selector:
    matchExpressions:
      - key: strimzi.io/kind
        operator: In
        values:
          - Kafka
          - KafkaConnect
          - KafkaMirrorMaker2
  podMetricsEndpoints:
    - port: tcp-prometheus
      path: /metrics
      scheme: http
      interval: 60s
      scrapeTimeout: 30s
      relabelings:
        - regex: __meta_kubernetes_pod_label_(strimzi_io_.+)
          replacement: $1
          action: labelmap
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: kubernetes_pod_name
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node_name
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_host_ip]
          targetLabel: node_ip
          action: replace
---
# PodMonitor for KafkaBridge pods (cross-namespace).
# Bridge exposes metrics on the rest-api port (8080), not tcp-prometheus.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "strimzi-kafka-operator.fullname" . }}-kafka-bridge
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "strimzi-kafka-operator.labels" . | nindent 4 }}
    {{- with .Values.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      strimzi.io/kind: KafkaBridge
  podMetricsEndpoints:
    - port: rest-api
      path: /metrics
      scheme: http
      interval: 60s
      scrapeTimeout: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: kubernetes_pod_name
          action: replace
---
# PodMonitor for the Entity Operator pod (cross-namespace).
# Exposes metrics on port healthcheck (8080).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "strimzi-kafka-operator.fullname" . }}-entity-operator
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "strimzi-kafka-operator.labels" . | nindent 4 }}
    {{- with .Values.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      app.kubernetes.io/name: entity-operator
  podMetricsEndpoints:
    - port: healthcheck
      path: /metrics
      scheme: http
      interval: 60s
      scrapeTimeout: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: kubernetes_pod_name
          action: replace
{{- end }}
