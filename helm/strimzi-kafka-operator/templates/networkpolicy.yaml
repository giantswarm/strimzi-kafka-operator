{{- if and (index .Values "strimzi-kafka-operator").enabled .Values.networkPolicy.enabled (eq .Values.networkPolicy.flavor "kubernetes") }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "strimzi-kafka-operator.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "strimzi-kafka-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "strimzi-kafka-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus scraping of operator metrics
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow access to Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # Allow operator to reach Kafka components on all ports.
    # Kafka uses many dynamic ports per topology; restricting here is impractical
    # without full knowledge of each cluster's port configuration.
    - {}
{{- end }}
