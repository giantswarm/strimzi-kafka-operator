{{- if and (index .Values "strimzi-kafka-operator").enabled .Values.networkPolicy.enabled (eq .Values.networkPolicy.flavor "cilium") }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "strimzi-kafka-operator.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "strimzi-kafka-operator.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "strimzi-kafka-operator.selectorLabels" . | nindent 6 }}
  ingress:
    # Allow Prometheus scraping of operator metrics
    - toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # Allow DNS resolution (kube-dns)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Allow access to Kubernetes API server
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
    # Allow operator to reach all Kafka operand pods.
    # Strimzi uses many ports per component and topology, making a precise
    # per-port egress rule impractical at the chart level.
    - toEndpoints:
        - {}
{{- end }}
