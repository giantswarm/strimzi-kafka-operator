# Giant Swarm wrapper values for strimzi-kafka-operator.
#
# For full configuration options, see the upstream chart:
#   https://github.com/strimzi/strimzi-kafka-operator/tree/main/helm-charts/helm3/strimzi-kafka-operator
#
# App Platform docs:
#   https://docs.giantswarm.io/tutorials/fleet-management/app-platform/app-configuration/

# -- CRD lifecycle management.
# CRDs are placed in templates/crds/ (not helm's crds/ dir) so they are
# updated on `helm upgrade`. The `helm.sh/resource-policy: keep` annotation
# prevents deletion on `helm uninstall` to protect user data.
#
# The bundled subchart also ships CRDs in its crds/ dir, which Helm installs
# without ownership metadata — conflicting with this chart's templates. Skip it:
#   Flux:    spec.install.crds: Skip (HelmRelease) — templates/crds/ handles lifecycle.
#            Or use CreateReplace/CreateReplace and set crds.install: false to let
#            Flux own CRD lifecycle from the subchart's crds/ dir instead.
#   ArgoCD:  skipCrds: true (Application .spec.source.helm) — templates/crds/ handles lifecycle.
#   Helm:    --skip-crds
crds:
  # Requires pairing with --skip-crds / spec.install.crds: Skip / skipCrds: true
  # so the subchart's crds/ dir is skipped — see comment above for details.
  # Set to false to let Flux manage CRDs via CreateReplace instead.
  install: true

# -- VerticalPodAutoscaler for the operator Deployment.
# Requires the VPA CRD to be installed on the cluster (available on most GS CAPI clusters).
# Disabled by default; enable per-installation if VPA is available.
verticalPodAutoscaler:
  enabled: true
  # "Auto" | "Recreate" | "Initial" | "Off"
  updateMode: "Auto"

# -- GS-specific NetworkPolicy.
# Controls NetworkPolicy generated by *this wrapper* for the operator pod.
# Does not affect NetworkPolicies Strimzi generates for Kafka components
# (controlled by strimzi-kafka-operator.generateNetworkPolicy).
networkPolicy:
  enabled: true
  # "cilium" → CiliumNetworkPolicy (default for CAPI clusters)
  # "kubernetes" → standard NetworkPolicy
  flavor: cilium


# -- PodMonitor for scraping operator metrics (port 8080 / Prometheus format).
# Docs: https://docs.giantswarm.io/overview/observability/data-management/data-ingestion/
podMonitor:
  enabled: true
  # labels are added to the PodMonitor resource itself.
  # The tenant label routes metrics to the correct Grafana Organization.
  labels:
    "observability.giantswarm.io/tenant": giantswarm
  # -- PodMonitors for Kafka workloads managed by the operator (cross-namespace).
  workloads:
    enabled: true

# -- Grafana dashboards (9 dashboards: Kafka, KRaft, KafkaConnect, MirrorMaker2,
# Bridge, CruiseControl, Exporter, OAuth, Operators).
# The upstream chart's dashboard template is disabled because the JSON files lack
# "uid" fields required by the GS admission webhook. This wrapper manages the
# ConfigMaps instead, using JSONs extracted and UID-patched via `make sync-dashboards`.
# Docs: https://docs.giantswarm.io/overview/observability/dashboard-management/dashboard-creation/
dashboards:
  enabled: true
  # namespace defaults to .Release.Namespace when empty.
  namespace: ""
  # GS uses ConfigMap label 'app.giantswarm.io/kind: dashboard' for dashboard discovery.
  label: "app.giantswarm.io/kind"
  labelValue: "dashboard"
  annotations:
    # Set to your Grafana organization slug.
    "observability.giantswarm.io/organization": "Shared Org"
    "observability.giantswarm.io/folder": Kafka

# -----------------------------------------------------------------------
# Upstream strimzi-kafka-operator chart values.
# All keys below are passed through to the upstream chart.
# See https://artifacthub.io/packages/helm/strimzi/strimzi-kafka-operator
# -----------------------------------------------------------------------
strimzi-kafka-operator:
  enabled: true

  # -- Global image registry/repository defaults.
  # All component images fall back to these when their per-component
  # registry/repository fields are empty.
  #
  # Images retagged from quay.io/strimzi/* to gsoci:
  #   quay.io/strimzi/operator          → gsoci.azurecr.io/giantswarm/strimzi/operator
  #   quay.io/strimzi/kafka             → gsoci.azurecr.io/giantswarm/strimzi/kafka
  #   quay.io/strimzi/kafka-bridge      → gsoci.azurecr.io/giantswarm/strimzi/kafka-bridge
  #   quay.io/strimzi/kaniko-executor   → gsoci.azurecr.io/giantswarm/strimzi/kaniko-executor
  #   quay.io/strimzi/buildah           → gsoci.azurecr.io/giantswarm/strimzi/buildah
  #   quay.io/strimzi/maven-builder     → gsoci.azurecr.io/giantswarm/strimzi/maven-builder
  defaultImageRegistry: gsoci.azurecr.io
  defaultImageRepository: giantswarm/strimzi
  # defaultImageTag is intentionally not set here.
  # The sub-chart owns this value (it equals the upstream appVersion).
  # Renovate bumps it automatically when it updates the Chart.yaml dependency.

  # Per-component images inherit registry/repository from defaults above
  # when left empty. Only override here if a component needs a different path.
  # kafkaBridge has its own release cadence independent of the operator.
  kafkaBridge:
    image:
      registry: ""
      repository: ""
      name: kafka-bridge
      # renovate: datasource=docker depName=gsoci.azurecr.io/giantswarm/strimzi/kafka-bridge
      tag: "0.33.1"

  # -- Number of operator replicas. Strimzi uses leader election so only one
  # replica is active at a time; additional replicas are hot standbys.
  # Requires replicas >= 2 for the PodDisruptionBudget to allow node drains.
  replicas: 2

  # -- Operator resource limits (tune based on number of Kafka clusters watched).
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 384Mi

  # -- Operator pod security context (hardened for GS standards).
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  # -- Operator container security context.
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  # -- Use the restricted pod security provider so all Strimzi-generated pods
  # (Kafka brokers, EntityOperator, etc.) get capabilities.drop=ALL,
  # allowPrivilegeEscalation=false, runAsNonRoot=true, and seccompProfile=RuntimeDefault
  # injected automatically. This satisfies GS Kyverno strict policies without
  # needing a KyvernoPolicyException.
  extraEnvs:
    - name: STRIMZI_POD_SECURITY_PROVIDER_CLASS
      value: io.strimzi.plugin.security.profiles.impl.RestrictedPodSecurityProvider

  # -- Disable the upstream-built-in NetworkPolicy for the operator pod.
  # We use our own GS-flavoured policy above (networkPolicy.enabled).
  operatorNetworkPolicy:
    enabled: false

  # -- Keep Strimzi-generated NetworkPolicies for Kafka component pods.
  generateNetworkPolicy: true

  # -- Enable leader election. Must be true when replicas > 1 to avoid
  # multiple active operators writing conflicting state.
  leaderElection:
    enable: true

  # -- Watch all namespaces for Kafka CRs.
  # Set to false and configure watchNamespaces if you want to restrict the
  # operator to specific namespaces (e.g. in a shared cluster where teams
  # manage their own operators).
  watchAnyNamespace: true

  # -- PodDisruptionBudget for the operator Deployment.
  # Ensures at least one replica is available during voluntary disruptions
  # (node drain, rolling upgrades). Requires replicas >= 2 to have any effect.
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # -- TopologySpreadConstraints spread operator pods across nodes.
  # Uses ScheduleAnyway so scheduling is never blocked on single-node clusters.
  # NOTE: requires upstream PR https://github.com/strimzi/strimzi-kafka-operator/pull/12560
  # to be merged before these values have any effect.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          name: strimzi-cluster-operator

  # -- Pod labels applied to the operator Deployment's pod template.
  # The tenant label enables GS log ingestion for the operator pod.
  # Docs: https://docs.giantswarm.io/overview/observability/data-management/data-ingestion/
  labels:
    "observability.giantswarm.io/tenant": giantswarm

  # -- Subchart dashboard template disabled permanently.
  # Two reasons we manage dashboards in the wrapper instead:
  # 1. The upstream JSONs lack "uid" fields required by the GS admission webhook
  #    (dashboardconfigmap.observability.giantswarm.io).
  # 2. The subchart ships JMX-based dashboards; we use the strimzi-metrics-reporter
  #    dashboards (+ strimzi-kafka-exporter) which require metricsConfig.type: strimziMetricsReporter.
  # Dashboards are managed via the wrapper's dashboards: block and synced with `make sync-dashboards`.
  dashboards:
    enabled: true
    # GS uses ConfigMap label 'app.giantswarm.io/kind: dashboard' for dashboard discovery.
    label: "app.giantswarm.io/kind"
    labelValue: "dashboard"
    annotations:
      # Set to your Grafana organization slug.
      "observability.giantswarm.io/organization": "Shared Org"
      "observability.giantswarm.io/folder": Kafka
