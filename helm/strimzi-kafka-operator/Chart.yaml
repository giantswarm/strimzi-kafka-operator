apiVersion: v2
name: strimzi-kafka-operator
description: >
  Giant Swarm app wrapping the Strimzi Kafka Operator, which manages Apache Kafka clusters natively on Kubernetes via custom resources.

type: application
# version is replaced by app-build-suite with the git tag
version: 0.0.2
# appVersion tracks the upstream strimzi-kafka-operator version
appVersion: "0.51.0"
home: https://github.com/giantswarm/strimzi-kafka-operator
## TODO configure the icon field with a custom app icon (see https://docs.giantswarm.io/reference/platform-api/chart-metadata/#icon)
icon: https://s.giantswarm.io/app-icons/giantswarm/1/light.svg
sources:
  - https://github.com/strimzi/strimzi-kafka-operator
  - https://github.com/giantswarm/strimzi-kafka-operator
annotations:
  io.giantswarm.application.audience: all
  io.giantswarm.application.managed: "true"
  io.giantswarm.application.team: atlas
maintainers:
  - name: giantswarm/team-atlas
    email: team-atlas@giantswarm.io
dependencies:
  - name: strimzi-kafka-operator
    version: "0.51.0"
    repository: https://strimzi.io/charts/
    condition: strimzi-kafka-operator.enabled
